<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FisioCid - Inicio</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --accent: #16a34a;
            --bg: #f1f5f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .menu-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.2rem; }
        p { color: #64748b; margin-bottom: 30px; }
        
        .btn-menu {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: var(--secondary);
            font-weight: 600;
        }
        .btn-menu:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1);
        }
        .icon { font-size: 1.5rem; margin-right: 15px; }
        .tag {
            margin-left: auto;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .public { background: #dcfce7; color: #166534; }
        .private { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>FisioCid</h1>
        <p>Gestión de Fisioterapia Avanzada</p>

        <a href="registro.html" class="btn-menu">
            <span class="icon">📋</span>
            <div>
                <div style="text-align: left;">Nueva Cita</div>
                <div style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">Para pacientes</div>
            </div>
            <span class="tag public">Público</span>
        </a>

        <a href="admin.html" class="btn-menu">
            <span class="icon">📅</span>
            <div>
                <div style="text-align: left;">Ver Agenda</div>
                <div style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">Gestión de clínica</div>
            </div>
            <span class="tag private">Admin</span>
        </a>

        <a href="https://wa.me/522383885291" target="_blank" class="btn-menu">
            <span class="icon">💬</span>
            <div style="text-align: left;">Soporte WhatsApp</div>
        </a>

        <div style="margin-top: 25px; font-size: 0.8rem; color: #94a3b8;">
            Santiago Miahuatlán, Puebla
        </div>
    </div>

</body>
</html>
