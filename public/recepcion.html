<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción FisioCid</title>
    <style>
        :root { --primary: #22c55e; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1050px; width: 100%; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Fuerza mayúsculas visuales mientras el paciente escribe */
        input[type="text"], textarea { text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        label { font-size: 0.9em; color: #64748b; font-weight: bold; margin-left: 5px; }
        .grid-names { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }
        .side-panel { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; height: fit-content; }
        .slot { padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.9em; font-weight: bold; }
        .libre { background: #dcfce7; color: #16a34a; }
        .ocupado { background: #fee2e2; color: #ef4444; text-decoration: line-through; opacity: 0.7; }
        .alert-domingo { background: #fff7ed; color: #c2410c; padding: 12px; border-radius: 8px; border: 1px solid #fed7aa; display: none; margin-bottom: 10px; font-weight: bold; font-size: 0.9em; }
        
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            .side-panel { order: 2; }
        }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="logo.jpeg" alt="FisioCid" style="width: 80px; margin-bottom: 10px;">
            <h2 style="margin:0; color:#1e293b;">Registro de Citas - FisioCid</h2>
            <p style="font-size: 0.85em; color: #64748b;">Santiago Miahuatlán, Puebla</p>
        </div>
        
        <label>Nombre(s):</label>
        <input type="text" id="nom" placeholder="Escribe tu nombre">
        
        <div class="grid-names">
            <div><label>Ap. Paterno:</label><input type="text" id="ap" placeholder="Apellido paterno"></div>
            <div><label>Ap. Materno:</label><input type="text" id="am" placeholder="Apellido materno"></div>
        </div>

        <div class="grid-names">
            <div><label>F. Nacimiento:</label><input type="date" id="fnac"></div>
            <div><label>Telefono:</label><input type="tel" id="tel" placeholder="10 dígitos"></div>
        </div>

        <hr style="margin:25px 0; border:0; border-top: 1px solid #eee;">

        <label>Selecciona la fecha de tu cita:</label>
        <input type="date" id="fec" onchange="actualizarVista()">
        
        <div id="aviso-dom" class="alert-domingo">⚠️ Nota: Las citas en domingo requieren confirmación de pago previa.</div>

        <label>Horario disponible:</label>
        <select id="hor"><option value="">Selecciona primero un día</option></select>

        <button class="btn-send" id="btn-agendar" onclick="procesarCita()">Agendar mi Sesión</button>
    </div>

    <div class="side-panel">
        <h3 style="margin-top:0; color: var(--accent);">Disponibilidad</h3>
        <p style="font-size: 0.8em; color: #64748b; margin-bottom: 15px;">Horarios en tiempo real para el día seleccionado:</p>
        <div id="lista-slots"><p style="color:gray; font-size:0.9em;">Selecciona una fecha en el calendario.</p></div>
    </div>
</div>

<script>
    document.getElementById('fec').min = new Date().toISOString().split("T")[0];
    const MI_WHATSAPP = "522383885291"; 

    // Esta función se activa en cuanto tocas el calendario
    async function actualizarVista() {
    const fec = document.getElementById('fec').value;
    if(!fec) return;

    // 1. Mostrar/Ocultar aviso de domingo
    const fechaObj = new Date(fec + 'T00:00:00');
    const esDom = fechaObj.getDay() === 0;
    document.getElementById('aviso-dom').style.display = esDom ? 'block' : 'none';

    // 2. Horarios de FisioCid
    const horariosBase = [
        "16:00", "16:30", "17:00", "17:30", "18:00", 
        "18:30", "19:00", "19:30", "20:00", "20:30"
    ];

    try {
        const res = await fetch(`/horarios-ocupados?fecha=${fec}`);
        const ocupados = res.ok ? await res.json() : [];
        
        // Pasamos los datos a la función que dibuja los cuadritos
        renderizarHorarios(horariosBase, ocupados);
    } catch (e) {
        console.warn("Error al conectar con el servidor.");
        renderizarHorarios(horariosBase, []);
    }
}

function renderizarHorarios(todos, ocupados) {
    let sHtml = '<option value="">-- Elige una hora --</option>';
    let lHtml = '';
    
    todos.forEach(hora => {
        // Comparamos limpiando espacios en ambos lados
        const isOc = ocupados.some(h => h.trim() === hora.trim()); 
        
        sHtml += `<option value="${hora}" ${isOc ? 'disabled' : ''}>${hora} hrs ${isOc ? '(Ocupado)' : ''}</option>`;
        lHtml += `<div class="slot ${isOc ? 'ocupado' : 'libre'}">
                    <span>${hora} hrs</span> 
                    <span>${isOc ? 'OCUPADO' : 'LIBRE'}</span>
                  </div>`;
    });
    
    document.getElementById('hor').innerHTML = sHtml;
    document.getElementById('lista-slots').innerHTML = lHtml;
}

async function procesarCita() {
    const btn = document.getElementById('btn-agendar');

    // 1. CAPTURA Y LIMPIEZA INMEDIATA
    const datos = {
        nombre: document.getElementById('nom').value.trim().toUpperCase(),
        ap: document.getElementById('ap').value.trim().toUpperCase(),
        am: document.getElementById('am').value.trim().toUpperCase(),
        fecha_nac: document.getElementById('fnac').value,
        tel: document.getElementById('tel').value.trim(),
        fecha_cita: document.getElementById('fec').value,
        hora_cita: document.getElementById('hor').value
    };

    // Validación de campos vacíos
    if(!datos.nombre || !datos.ap || !datos.fecha_nac || !datos.tel || !datos.fecha_cita || !datos.hora_cita) {
        return alert("Por favor, rellena todos los campos.");
    }

    try {
        btn.disabled = true;
        btn.innerText = "Agendando...";

        const res = await fetch('/registro-recepcion-completo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(datos)
        });

        if(res.ok) {
            const mensajeWA = `Hola FisioCid, soy ${datos.nombre}. Agendé cita para el ${datos.fecha_cita} a las ${datos.hora_cita} hrs.`;
            window.open(`https://wa.me/522383885291?text=${encodeURIComponent(mensajeWA)}`, '_blank');
            location.reload();
        } else {
            alert("Error al guardar. Revisa que el servidor esté encendido.");
        }
    } catch (e) {
        alert("Error de conexión. Verifica el puerto 3000.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Agendar mi Sesión";
    }
}
</script>
</body>
</html>
